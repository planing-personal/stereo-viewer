<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stereo Image Viewer</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body class="font-sans bg-[#111] text-[#ccc] flex flex-col select-none h-screen overflow-hidden">

<div class="toolbar-row flex shrink-0">
  <div class="toolbar flex-1 flex items-center px-4 py-2 bg-[#1a1a2e] border-b border-[#333]">
    <div class="flex-1 flex items-center gap-2.5">
      <button id="fullscreenBtn" class="bg-[#2a2a4a] text-[#ddd] border border-[#444] px-3 py-1 rounded cursor-pointer text-[13px] whitespace-nowrap hover:bg-[#3a3a5a] active:bg-[#222244]">Fullscreen</button>
    </div>
    <div class="flex-1 flex items-center gap-2.5 justify-center">
      <button id="swapBtn" class="bg-[#2a2a4a] text-[#ddd] border border-[#444] px-3 py-1 rounded cursor-pointer text-[13px] whitespace-nowrap hover:bg-[#3a3a5a] active:bg-[#222244]">Swap L/R</button>
    </div>
    <div class="flex-1 flex items-center gap-2.5 justify-end">
      <div class="flex items-center gap-1.5">
        <label class="text-[13px] text-[#888]">Size</label>
        <input type="range" id="sizeRng" min="5" max="100" value="50" class="w-20 accent-[#6c63ff]">
        <span id="sizeVal" class="text-[13px]">50%</span>
      </div>
    </div>
  </div>
  <div class="zoom-info w-16 flex flex-col items-center justify-center bg-[#1a1a2e] border-b border-[#333] border-l border-[#333] text-xs text-[#555] tabular-nums">
    <span id="zoomText">Zoom: </span>
    <span id="zoomVal">1.00</span>
  </div>
</div>

<div class="viewer-wrap flex-1 flex overflow-hidden">
  <div class="viewer flex-1 flex overflow-hidden p-[10px] bg-[#0a0a14] items-center justify-center">
    <div class="panels-wrapper flex gap-0 w-full max-w-full max-h-full min-h-[150px]" id="pw">
      <div id="p0" class="flex-1 flex flex-col relative overflow-hidden bg-[#0a0a14] border-[10px] border-white min-h-[100px] border-r-[5px] rounded-tl-[6px] rounded-bl-[6px]">
        <div class="hint-container h-full content-center p-[10px]">
          <div class="text-center py-1">
            <span class="text-white/30 text-2xl pointer-events-none z-[2] tracking-wider uppercase">Left</span>
          </div>
          <div class="py-1">
            <span class="flex items-center justify-center text-[#444] text-sm pointer-events-none z-[1]">Drop LEFT image here</span>
          </div>
          <div class="text-center py-[14px]">
            <button id="loadLeftBtn" class="bg-[#2a2a4a] text-[#ddd] border border-[#444] px-2 py-1 rounded cursor-pointer text-[13px] whitespace-nowrap hover:bg-[#3a3a5a] active:bg-[#222244]">Upload</button>
            <input type="file" id="inpL" accept="image/*">
          </div>
        </div>
        <div class="image-wrap flex-1 flex items-center overflow-hidden justify-end" id="w0"></div>
      </div>
      <div id="p1" class="flex-1 flex flex-col relative overflow-hidden bg-[#0a0a14] border-[10px] border-white min-h-[100px] border-l-[5px] rounded-tr-[6px] rounded-br-[6px]">
        <div class="hint-container h-full content-center p-[10px]">
          <div class="text-center py-1">
            <span class="text-white/30 text-2xl pointer-events-none z-[2] tracking-wider uppercase">Right</span>
          </div>
          <div class="py-1">
            <span class="flex items-center justify-center text-[#444] text-sm pointer-events-none z-[1]">Drop RIGHT image here</span>
          </div>
          <div class="text-center py-[14px]">
            <button id="loadRightBtn" class="bg-[#2a2a4a] text-[#ddd] border border-[#444] px-2 py-1 rounded cursor-pointer text-[13px] whitespace-nowrap hover:bg-[#3a3a5a] active:bg-[#222244]">Upload</button>
            <input type="file" id="inpR" accept="image/*">
          </div>
        </div>
        <div class="image-wrap flex-1 flex items-center overflow-hidden justify-start" id="w1"></div>
      </div>
    </div>
  </div>
  <div class="scroll-wheel shrink-0 w-16 relative flex-col items-center justify-between py-[14px] select-none border-l border-[#333]" id="scrollWheel">
    <span class="scroll-wheel-label text-[#555] text-[22px] font-light z-[1]">+</span>
    <span class="scroll-wheel-label text-[#555] text-[22px] font-light z-[1]">−</span>
  </div>
</div>
<div class="rotate-prompt fixed inset-0 z-[999] bg-[#0a0a14] text-[#888] items-center justify-center" id="rotatePrompt">
  <div class="justify-items-center text-center">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-4 animate-[rotate-phone_2s_ease-in-out_infinite]">
      <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
    </svg>
    <p class="text-base">Rotate your device to landscape</p>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
