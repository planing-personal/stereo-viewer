<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stereo Image Viewer</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="toolbar">
  <button id="loadLeftBtn">Load Left</button>
  <input type="file" id="inpL" accept="image/*">
  <button id="loadRightBtn">Load Right</button>
  <input type="file" id="inpR" accept="image/*">
  <button id="swapBtn">Swap</button>
  <div class="ctrl-row">
    <label>Size</label>
    <input type="range" id="sizeRng" min="5" max="100" value="50">
    <span id="sizeVal">50%</span>
  </div>
  <span class="zoom-info">Zoom: <span id="zoomVal">1.00</span>x</span>
</div>

<div class="viewer">
  <div class="panels-wrapper" id="pw">
    <div class="panel" id="p0">
      <span class="panel-label">Left</span>
      <span class="panel-hint">Drop LEFT image here</span>
      <div class="image-wrap" id="w0"></div>
    </div>
    <div class="panel" id="p1">
      <span class="panel-label">Right</span>
      <span class="panel-hint">Drop RIGHT image here</span>
      <div class="image-wrap" id="w1"></div>
    </div>
  </div>
</div>

<div class="rotate-prompt" id="rotatePrompt">
  <div class="rotate-prompt-inner">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
    </svg>
    <p>Rotate your device to landscape</p>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
